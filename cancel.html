<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout Cancelled — Monthly Probate Direct</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #1a2744; --gold: #c89b3c; --orange: #f97316;
      --gray-bg: #f4f6f9; --gray-border: #dde1e9; --white: #ffffff;
      --text: #1e2535; --muted: #6b7280;
    }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--gray-bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: var(--navy);
      color: var(--white);
      padding: 0 2rem;
      height: 64px;
      display: flex;
      align-items: center;
    }
    .logo-primary { font-size: 1.05rem; font-weight: 700; }
    .logo-secondary { font-size: .7rem; letter-spacing: .1em; text-transform: uppercase; color: var(--gold); display: block; }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.25rem;
    }
    .card {
      background: var(--white);
      border: 1px solid var(--gray-border);
      border-radius: 10px;
      padding: 3rem 2.5rem;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
    }
    .cancel-icon {
      width: 72px; height: 72px;
      background: #fff7ed;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      color: var(--orange);
    }
    h1 { font-size: 1.6rem; font-weight: 700; color: var(--navy); margin-bottom: .6rem; }
    .subtitle { color: var(--muted); font-size: .95rem; line-height: 1.6; margin-bottom: 2rem; }
    .actions { display: flex; flex-direction: column; gap: .75rem; }
    .btn-primary {
      display: block;
      background: var(--gold);
      color: var(--navy);
      font-size: .95rem;
      font-weight: 700;
      padding: .8rem 2rem;
      border-radius: 8px;
      text-decoration: none;
      transition: opacity .15s;
    }
    .btn-primary:hover { opacity: .85; }
    .btn-secondary {
      display: block;
      background: transparent;
      color: var(--muted);
      font-size: .88rem;
      padding: .5rem 2rem;
      border-radius: 8px;
      text-decoration: none;
      border: 1px solid var(--gray-border);
      transition: border-color .15s, color .15s;
    }
    .btn-secondary:hover { border-color: var(--navy); color: var(--navy); }
    footer {
      background: var(--navy);
      color: rgba(255,255,255,.45);
      text-align: center;
      padding: 1rem;
      font-size: .75rem;
    }
  </style>
</head>
<body>
<header>
  <div>
    <span class="logo-primary">Monthly Probate Direct</span>
    <span class="logo-secondary">Real Estate Data Services</span>
  </div>
</header>

<main>
  <div class="card">
    <div class="cancel-icon">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <line x1="15" y1="9" x2="9" y2="15"/>
        <line x1="9" y1="9" x2="15" y2="15"/>
      </svg>
    </div>
    <h1>Checkout cancelled</h1>
    <p class="subtitle">No worries — your cart is still saved. Head back whenever you're ready to subscribe to your Maryland county leads.</p>
    <div class="actions">
      <a href="/" class="btn-primary">Return to County Selection</a>
      <a href="mailto:support@monthlyprobatedirect.com" class="btn-secondary">Questions? Contact Support</a>
    </div>
  </div>
</main>

<footer>&copy; 2026 Monthly Probate Direct</footer>
</body>
</html>
